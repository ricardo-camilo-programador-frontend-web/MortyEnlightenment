    34|    name: Build do Projeto
    35|    runs-on: ubuntu-latest
    36|    timeout-minutes: 15
    37|    env:
    38|      NUXT_PUBLIC_BASE_URL: ""
    39|      NUXT_PUBLIC_LOGO: ""
    40|      NUXT_PUBLIC_TITLE: ""
    41|      NUXT_PUBLIC_DESCRIPTION: ""
