    69|  security:
    70|    name: Auditoria de Seguranca
    71|    runs-on: ubuntu-latest
    72|    timeout-minutes: 10
    73|    continue-on-error: true
    74|    steps:
    75|      - uses: actions/checkout@v4
    76|
    77|      - uses: pnpm/action-setup@v2
    78|        with:
    79|          version: 8.15.4
    80|
    81|      - uses: actions/setup-node@v4
    82|        with:
    83|          node-version: lts/*
    84|          cache: 'pnpm'
    85|
    86|      - name: Instalar dependencias
    87|        run: pnpm install
    88|
    89|      - name: Auditoria de vulnerabilidades
    90|        shell: bash
    91|        run: |
    92|          set -o pipefail
    93|          LOG_FILE="$(mktemp)"
    94|
    95|          pnpm audit --audit-level moderate 2>&1 | tee "$LOG_FILE"
    96|          status=${PIPESTATUS[0]}
    97|
    98|          if [ "$status" -eq 0 ]; then
    99|            exit 0
   100|          fi
   101|
   102|          if grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE" "$LOG_FILE" && grep -Eq "responded with 5[0-9]{2}([^0-9]|$)|error \\(5[0-9]{2}\\)" "$LOG_FILE"; then
   103|            echo "::warning::pnpm audit falhou por erro 5xx do endpoint de auditoria da npm."
   104|            exit 0
   105|          fi
   106|
   107|          exit "$status"
   108|