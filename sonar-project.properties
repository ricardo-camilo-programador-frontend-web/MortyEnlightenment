# ============================================================================
# SonarQube Configuration - Morty Enlightenment
# Based on SGS_WEB_DEVELOPER_DEV reference implementation
# ============================================================================
sonar.projectKey=mortyenlightenment
sonar.projectName=Morty Enlightenment
sonar.projectVersion=0.0.0
sonar.sources=.
sonar.host.url=http://localhost:9000
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/tests/**,*.tsbuildinfo,**/*.d.ts,**/.nuxt/**,**/.output/**
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/tests/**

# Coverage (if available)
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
